name: Submit WinGet Manifest

on:
  release:
    types: [published]

jobs:
  submit-winget:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wingetcreate
        shell: pwsh
        run: |
          winget install --id Microsoft.WingetCreate --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Submit WinGet manifest
        shell: pwsh
        env:
          WINGETCREATE_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if (-not $env:WINGETCREATE_TOKEN) {
            throw "Missing repository secret WINGETCREATE_TOKEN"
          }

          $version = $env:RELEASE_TAG.TrimStart('v')
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/cli-music-windows-x64.exe"
          $prTitle = "Add BonnieBoni.CliMusic $version"

          ./stream-cli/winget/submit-with-wingetcreate.ps1 `
            -Identifier "BonnieBoni.CliMusic" `
            -Version $version `
            -InstallerUrl $installerUrl `
            -PrTitle $prTitle `
            -Token $env:WINGETCREATE_TOKEN
